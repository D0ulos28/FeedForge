name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build and Release Windows EXE
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]

      - name: Install Node.js dependencies
        run: npm ci

      - name: Download missing CLI tools
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path src\feedback_converter\tools
          
          # Download and extract ww2ogg
          Invoke-WebRequest -Uri "https://hcs64.com/files/ww2ogg04.zip" -OutFile "ww2ogg.zip"
          Expand-Archive -Path "ww2ogg.zip" -DestinationPath "ww2ogg_extracted" -Force
          Copy-Item -Path "ww2ogg_extracted\ww2ogg.exe" -Destination "src\feedback_converter\tools\ww2ogg.exe" -Force
          
          # Download and extract vgmstream
          Invoke-WebRequest -Uri "https://github.com/vgmstream/vgmstream/releases/latest/download/vgmstream-win.zip" -OutFile "vgmstream.zip"
          Expand-Archive -Path "vgmstream.zip" -DestinationPath "vgmstream_extracted" -Force
          Copy-Item -Path "vgmstream_extracted\vgmstream-cli.exe" -Destination "src\feedback_converter\tools\vgmstream-cli.exe" -Force
          Copy-Item -Path "vgmstream_extracted\*.dll" -Destination "src\feedback_converter\tools\" -Force

      - name: Build and Package App
        run: npm run release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
